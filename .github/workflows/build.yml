name: Build and Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      GHOST_ALLOW_EMPTY: "true"
      SITE_URL: https://blog.silentflare.com
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome checks
        run: pnpm lint

      - name: Run Astro check
        run: pnpm typecheck

      - name: Build site and search index
        run: pnpm build

      - name: Verify required build outputs
        run: pnpm test:smoke

  deploy:
    name: Deploy FNS1
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger deployment webhook
        env:
          DEPLOY_ORIGIN_HOST: blog.silentflare.com
          DEPLOY_ORIGIN_IP: 167.233.129.17
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "::error::Missing DEPLOY_WEBHOOK_URL repository secret"
            exit 1
          fi

          DEPLOY_TOKEN="${DEPLOY_WEBHOOK_URL#*token=}"
          DEPLOY_TOKEN="${DEPLOY_TOKEN%%&*}"
          if [ -z "$DEPLOY_TOKEN" ] || [ "$DEPLOY_TOKEN" = "$DEPLOY_WEBHOOK_URL" ]; then
            echo "::error::DEPLOY_WEBHOOK_URL must contain a token query parameter"
            exit 1
          fi

          curl --fail --silent --show-error \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 2 \
            --retry-delay 5 \
            --header "Host: $DEPLOY_ORIGIN_HOST" \
            --output /tmp/deploy-response.json \
            "http://$DEPLOY_ORIGIN_IP/hooks/rebuild?token=$DEPLOY_TOKEN"

          cat /tmp/deploy-response.json
